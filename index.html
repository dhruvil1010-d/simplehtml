<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Inline CSS Example</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f0f4f8;">
  <header style="background: #4a90e2; color: #fff; padding: 20px; text-align: center;">
    <h1 style="margin: 0; font-size: 2rem;">Welcome to My Page</h1>
  </header>
  <main style="padding: 20px;">
    <section style="background: #ffffff; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 20px;">
      <h2 style="color: #333;">Simple HTML with Inline CSS</h2>
      <p style="line-height: 1.6; color: #555;">
        This example uses inline CSS rules directly on HTML elements to style the page. Inline CSS is useful for small examples or when you need quick styling without a separate stylesheet.
      </p>
      <button style="background: #4a90e2; color: #fff; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer;">Click Me</button>
    </section>
  </main>
</body>
</html>
